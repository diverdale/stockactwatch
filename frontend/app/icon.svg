<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 13 alternating red/white stripes -->
  <rect width="100" height="100" fill="#B22234"/>
  <!-- White stripes (positions 1,3,5,7,9,11 of 0-indexed 13 stripes, each 7.6923px tall) -->
  <rect x="0" y="7.69"  width="100" height="7.69" fill="#FFFFFF"/>
  <rect x="0" y="23.08" width="100" height="7.69" fill="#FFFFFF"/>
  <rect x="0" y="38.46" width="100" height="7.69" fill="#FFFFFF"/>
  <rect x="0" y="53.85" width="100" height="7.69" fill="#FFFFFF"/>
  <rect x="0" y="69.23" width="100" height="7.69" fill="#FFFFFF"/>
  <rect x="0" y="84.62" width="100" height="7.69" fill="#FFFFFF"/>

  <!-- Blue canton: 7 stripes tall (~53.85), ~40% wide -->
  <rect x="0" y="0" width="40" height="53.85" fill="#3C3B6E"/>

  <!-- 13 stars in a circle, center (20, 26.92), radius 12 -->
  <!-- Star symbol: outer r=1.8, inner r=0.76 -->
  <defs>
    <polygon id="s" fill="#FFFFFF"
      points="0,-1.8 0.447,-0.614 1.711,-0.556 0.723,0.235 1.059,1.456 0,0.76 -1.059,1.456 -0.723,0.235 -1.711,-0.556 -0.447,-0.614"/>
  </defs>

  <!-- Star positions: 13 stars evenly spaced on circle of r=12 centered at (20, 26.92) -->
  <use href="#s" transform="translate(20.00, 14.92)"/>
  <use href="#s" transform="translate(25.58, 16.30)"/>
  <use href="#s" transform="translate(29.87, 20.11)"/>
  <use href="#s" transform="translate(31.91, 25.48)"/>
  <use href="#s" transform="translate(31.21, 31.20)"/>
  <use href="#s" transform="translate(27.95, 35.91)"/>
  <use href="#s" transform="translate(22.87, 38.58)"/>
  <use href="#s" transform="translate(17.13, 38.58)"/>
  <use href="#s" transform="translate(12.05, 35.91)"/>
  <use href="#s" transform="translate(8.79,  31.20)"/>
  <use href="#s" transform="translate(8.09,  25.48)"/>
  <use href="#s" transform="translate(10.13, 20.11)"/>
  <use href="#s" transform="translate(14.42, 16.30)"/>
</svg>
